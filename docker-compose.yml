version: '3.9'

services:
  frontend:
    build: .
    container_name: react_frontend
    restart: always
    expose:
      - 80

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend